name: Debug Terraform

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Show current directory
        run: |
          echo "PWD:"
          pwd
          echo "FILES:"
          ls -la
          echo "ALL TERRAFORM FILES:"
          find . -name "*.tf"

      - name: Display main.tf
        run: |
          cat main.tf || echo "main.tf not found"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Version
        run: terraform version

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan
